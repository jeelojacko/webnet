name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm run test:run
      - name: Build
        run: npm run build
      - name: CLI Smoke JSON
        run: node node_modules/tsx/dist/cli.mjs src/cli.ts --input tests/fixtures/cli_smoke.dat --output json --out cli-smoke.json --autoadjust off
      - name: CLI Smoke Listing
        run: node node_modules/tsx/dist/cli.mjs src/cli.ts --input tests/fixtures/cli_smoke.dat --profile industry-parity --output listing --out cli-smoke.txt --autoadjust on --autoadjust-threshold 4 --autoadjust-cycles 2 --autoadjust-max-removals 1
      - name: Legacy Corpus Gate
        run: npm run corpus:legacy:ci
      - name: Upload Legacy Corpus Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: legacy-corpus-summary
          path: artifacts/legacy-corpus/
          if-no-files-found: warn
